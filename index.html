    /* ── Fonts ── */
    @font-face {
      font-family: 'Minecraft';
      src: url('fonts/1_MinecraftRegular1.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Almoni';
      src: url('fonts/Almoni DL AAA.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Almoni';
      src: url('fonts/almoni-dl-aaa-bold.otf') format('opentype');
      font-weight: 700;
    }

    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      color: #fff;
      font-family: 'Almoni', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ── Slide system ── */
    .slides-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      overflow: hidden;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Scaling wrapper — design is 1920x1080 ── */
    .slide-inner {
      position: absolute;
      width: 1920px;
      height: 1080px;
      top: 50%;
      left: 50%;
      transform-origin: center center;
    }

<script>
  // ── Responsive scaling ──
  function scaleSlides() {
    const vw = window.innerWidth;
    const vh = window.innerHeight - 64; // minus nav height
    const scaleX = vw / 1920;
    const scaleY = vh / 1080;
    const scale = Math.min(scaleX, scaleY);

    document.querySelectorAll('.slide-inner').forEach(inner => {
      inner.style.transform = `translate(-50%, -50%) scale(${scale})`;
    });
  }

  scaleSlides();
  window.addEventListener('resize', scaleSlides);

</script>
